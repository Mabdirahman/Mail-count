<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mailing Tally Tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f4f6f8;
}

h2 {
    margin-bottom: 10px;
}

.section {
    margin-bottom: 30px;
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.section h3 {
    margin-top: 0;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
}

.location {
    display: flex;
    align-items: center;
    padding: 4px 0;
}

.location span {
    flex: 1;
}

.location button {
    width: 60px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background: #4a90e2;
    color: white;
}

button:hover {
    background: #357abd;
}

.reset-btn {
    background: #d9534f;
}

.reset-btn:hover {
    background: #c9302c;
}

#container {
    max-height: 600px;
    overflow-y: auto;
    margin-bottom: 30px;
}
</style>
</head>
<body>

<h2>Mailing Tally Tracker</h2>

<div id="container"></div>

<button onclick="exportWeeklyReport()">Export Weekly Report</button>
<button class="reset-btn" onclick="resetTally()">Reset All Counts</button>

<hr>

<h3>Mailing Report</h3>
<div id="report"></div>

<h3>Grand Total: <span id="grandTotal">0</span></h3>

<script>

// =====================
// DATA GROUPS
// =====================

const regularLocations = [
"Attleboro","Ayer","Brighton","Central Boston","East Boston","South Boston",
"Barnstable","S. Berkshire","Brockton","Brookline","E. Brookfield","Cambridge",
"Charlestown","Chelsea","Chicopee","Clinton","Concord","Dedham","Dorchester",
"Dudley","Edgartown","Fall River","Falmouth","Fitchburg","Framingham","Gardner",
"Gloucester","Greenfield","Haverhill","Hingham","Holyoke","East Hampshire",
"Ipswich","Lawrence","Leominster","Lowell","Lynn","Malden","Marlboro","Milford",
"Nantucket","Natick","New Bedford","Newburyport","Newton","Northamton",
"North Berkshire","Orange","Orleans","Palmer","Peabody","Pittsfield","Plymouth",
"Quincy","Roxbury","West Roxbury","Salem","Springfield","Somerville",
"Stoughton","Taunton","Uxbridge","Waltham","Wareham","Westboro","Westfield",
"Winchendon","Woburn","Worcester","Wrentham"
];

const juvenileCourt = [
"Barnstable","Berkshire","Bristol","Essex",
"Franklin/Hampshire","Hampden","Middlesex",
"Norfolk","Plymouth","Suffolk","Worcester"
];

const superiorCourt = [
"Barnstable","Berkshire","Bristol","Essex",
"Franklin","Hampden","Hampshire","Middlesex",
"Norfolk","Plymouth","Suffolk","Worcester"
];

// =====================
// STORAGE
// =====================

let tally = JSON.parse(localStorage.getItem("tally")) || {};

function initializeGroup(groupName, locations) {
    const container = document.getElementById("container");

    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("h3");
    title.textContent = groupName;
    section.appendChild(title);

    locations.forEach(loc => {

        const key = groupName + " - " + loc;

        if (!(key in tally)) tally[key] = 0;

        const row = document.createElement("div");
        row.className = "location";

        const label = document.createElement("span");
        label.textContent = `${loc} (${tally[key]})`;

        const button = document.createElement("button");
        button.textContent = "Add";
        button.onclick = function() {
            tally[key]++;
            localStorage.setItem("tally", JSON.stringify(tally));
            label.textContent = `${loc} (${tally[key]})`;
            updateReport();
        };

        row.appendChild(label);
        row.appendChild(button);
        section.appendChild(row);
    });

    container.appendChild(section);
}

// =====================
// REPORT
// =====================

function updateReport() {
    const reportDiv = document.getElementById("report");
    const grandTotalSpan = document.getElementById("grandTotal");

    reportDiv.innerHTML = "";
    let grandTotal = 0;
    const groupedTotals = {};

    for (let key in tally) {
        if (tally[key] > 0) {
            const [group, location] = key.split(" - ");

            if (!groupedTotals[group]) {
                groupedTotals[group] = {
                    total: 0,
                    locations: []
                };
            }

            groupedTotals[group].locations.push({
                location: location,
                count: tally[key]
            });

            groupedTotals[group].total += tally[key];
            grandTotal += tally[key];
        }
    }

    for (let group in groupedTotals) {
        const section = document.createElement("div");
        section.className = "section";

        const title = document.createElement("h4");
        title.textContent = `${group} (Total: ${groupedTotals[group].total})`;
        section.appendChild(title);

        groupedTotals[group].locations.forEach(item => {
            const line = document.createElement("div");
            line.textContent = `${item.location} — ${item.count}`;
            section.appendChild(line);
        });

        reportDiv.appendChild(section);
    }

    grandTotalSpan.textContent = grandTotal;
}

// =====================
// EXPORT
// =====================

function exportWeeklyReport() {

    let csv = [];
    csv.push(["Department", "Location", "Count"]);

    let grandTotal = 0;

    for (let key in tally) {
        if (tally[key] > 0) {
            const [group, location] = key.split(" - ");
            const count = tally[key];

            csv.push([group, location, count]);
            grandTotal += count;
        }
    }

    csv.push([]);
    csv.push(["Grand Total", "", grandTotal]);

    let csvContent = csv.map(e => e.join(",")).join("\n");

    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;

    const today = new Date();
    const dateString = today.toISOString().split("T")[0];

    a.download = `Weekly_Mailing_Report_${dateString}.csv`;
    a.click();

    URL.revokeObjectURL(url);
}

// =====================
// RESET
// =====================

function resetTally() {
    if(confirm("Are you sure you want to reset all counts?")) {
        localStorage.removeItem("tally");
        location.reload();
    }
}

// =====================
// INITIALIZE
// =====================

initializeGroup("District Court Dept", regularLocations);
initializeGroup("Juvenile Court Dept", juvenileCourt);
initializeGroup("Superior Court Dept", superiorCourt);

updateReport();

</script>

</body>
</html>
